services:
  - type: web
    name: vicloud-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: https://vinkspace.fun
      - key: REDIS_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_WABA_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: worker
    name: vicloud-celery-worker
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./start-worker.sh
    envVars:
      - key: REDIS_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_WABA_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: DATABASE_URL
        sync: false
