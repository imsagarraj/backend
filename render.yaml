services:
  - type: web
    name: vicloud-api
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: https://vinkspace.fun
      - key: REDIS_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_WABA_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: DATABASE_URL
        sync: false
